
<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
		<meta name="description" content="Sample Code to implement transform and transition">
	    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
	    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
			* {
				box-sizing: border-box;
			}
			#deck{
				width: 50vw;
				height: 50vh;
				margin: 0 auto 110px;
				border: 3px solid black;
				padding: 40px;
			}
			#deck div{
				border: 3px solid black;
				height: 40vh;
				width: 40vh;
				background-color: white;
				color: red;
				font-size: 2em;
				padding: 5px;
				font-weight: bold;
				position: absolute;
			}
			#deck div:hover{
				border: 3px solid yellow;
			}
			#deck div:first-child:hover{
				background-color: yellow;
				z-index: 1;
			}
			#deck div:nth-child(2):hover{
				background-color: orange;
				z-index: 2;
			}
			#deck div:nth-child(3):hover{
				background-color: green;
				z-index: 3;
			}
			#deck div:nth-child(4):hover{
				background-color: blue;
				z-index: 4;
			}
			#deck div:nth-child(5):hover{
				background-color: violet;
				z-index: 5;
			}
			a {
				text-decoration: none;
			}
			button {
				display: block;
				width: 25vw;
				padding: 5px;
				margin: 10px auto;
			}
		</style>
	</head>
	<body>
		<div id="deck">
			<div> &#128742;</div>
			<div> &#128060;</div>
			<div> &#127769;</div>
			<div> &#127875;</div>
      		<div> &#127183;</div>
		</div>
    <a href="../index.html"><button> Click me for Home</button> </a>
	</body>
</html>
